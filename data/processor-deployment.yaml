apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
      - name: processor
        image: lauravrv/processor-app:v1
        env:
        - name: REDIS_HOST
          value: "redis-service.data.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_CHANNEL
          value: "log_channel"
