apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: lauravrv/auth-app:v1
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "200m"
        env:
        - name: JWT_SECRET
          value: "PRFT"
        - name: AUTH_API_PORT
          value: "8000"
        - name: USERS_API_ADDRESS
          value: "http://users-service.auth.svc.cluster.local:8083"
        - name: ZIPKIN_URL
          value: "http://zipkin-service.data.svc.cluster.local:9411"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: auth
spec:
  selector:
    app: auth
  ports:
  - port: 8000
    targetPort: 8000
