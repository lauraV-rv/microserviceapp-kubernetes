apiVersion: apps/v1
kind: Deployment
metadata:
  name: users
  namespace: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
    spec:
      containers:
      - name: users
        image: lauravrv/users-app:v1
        ports:
        - containerPort: 8083
        env:
        - name: JWT_SECRET
          value: "PRFT"
        - name: SERVER_PORT
          value: "8083"

