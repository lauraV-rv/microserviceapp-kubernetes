apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: todos-hpa
  namespace: todos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: todos
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
