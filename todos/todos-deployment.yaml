apiVersion: apps/v1
kind: Deployment
metadata:
  name: todos
  namespace: todos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todos
  template:
    metadata:
      labels:
        app: todos
    spec:
      containers:
      - name: todos
        image: lauravrv/todos-app:v1
        ports:
        - containerPort: 8082
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "200m"
        env:
        - name: JWT_SECRET
          value: "PRFT"
        - name: TODO_API_PORT
          value: "8082"
        - name: REDIS_HOST
          value: "redis-service.data.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_CHANNEL
          value: "log_channel"
        - name: ZIPKIN_URL
          value: "http://zipkin-service.data.svc.cluster.local:9411"
---
apiVersion: v1
kind: Service
metadata:
  name: todos-service
  namespace: todos
spec:
  selector:
    app: todos
  ports:
  - port: 8082
    targetPort: 8082
