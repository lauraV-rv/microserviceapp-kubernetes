apiVersion: apps/v1
kind: Deployment
metadata:
  name: todos
  namespace: todos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todos
  template:
    metadata:
      labels:
        app: todos
    spec:
      containers:
      - name: todos
        image: lauravrv/todos-app:v1
        ports:
        - containerPort: 8082
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "200m"
        envFrom:
        - configMapRef:
            name: todos-config
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET

